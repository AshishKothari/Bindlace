<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous AI Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .log-entry { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="glass p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">Autonomous AI Developer</h1>
        </div>
        <div class="flex gap-4 text-sm text-slate-400">
            <span>Uptime: <span id="uptime" class="text-white">00:00:00</span></span>
            <span>API Cost: <span id="cost" class="text-white">$0.00</span></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        
        <!-- Left Column: Tasks -->
        <div class="w-1/3 flex flex-col gap-4">
            <!-- Current Task -->
            <div class="glass rounded-xl p-4 shadow-lg border-l-4 border-blue-500">
                <h2 class="text-xs uppercase tracking-wider text-slate-400 mb-2">Current Activity</h2>
                <div id="current-task" class="text-lg font-semibold text-white mb-2">Initializing System...</div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-[0%] transition-all duration-500"></div>
                </div>
            </div>

            <!-- Task List -->
            <div class="glass rounded-xl p-4 flex-1 overflow-hidden flex flex-col">
                <h2 class="text-xs uppercase tracking-wider text-slate-400 mb-2">Mission Tasks</h2>
                <div id="task-list" class="flex-1 overflow-y-auto space-y-2 pr-2">
                    <!-- Tasks will be injected here -->
                    <div class="p-3 rounded bg-slate-800/50 flex gap-3 items-start opacity-75">
                        <span class="text-slate-500 mt-1">○</span>
                        <div class="flex-1">
                            <div class="text-sm font-medium">Waiting for tasks...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Logs & Terminal -->
        <div class="w-2/3 glass rounded-xl flex flex-col overflow-hidden">
            <div class="p-3 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <span class="text-xs uppercase tracking-wider text-slate-400">System Logs</span>
                <button class="text-xs text-blue-400 hover:text-blue-300">Clear</button>
            </div>
            <div id="logs" class="flex-1 overflow-y-auto p-4 space-y-1 bg-slate-900/50 text-slate-300 font-mono text-sm">
                <!-- Logs injected here -->
            </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
