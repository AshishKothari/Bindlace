# Point `baseUrl` at your running dev app (port is arbitrary).
wflowSpecVersion: 1
kind: wdata
log: "Data file: baseUrl is ${data.baseUrl}"
meta:
  id: local-dev
  name: Local app URL
  description: Example targets http://localhost:3001 — change baseUrl if your app uses another host/port.
data:
  baseUrl: http://localhost:3001
